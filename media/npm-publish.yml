name: Publish to npm

# Phase 11B.3: tag-triggered publish to npm.
#
# Cross-language parity is enforced by determinism-gate.yml (TS + Python + Rust
# golden vectors at the same commit, on every push/PR) - this workflow only
# gates the TS surface at publish time.
#
# Trigger: a tag matching `v*` (e.g. `v0.10.0`) pushed to `main`.
# The workflow runs the test suite and full TS build, then
# `npm publish --access public` (scopes default to private; flag
# required for public release).
#
# Auth: Trusted Publishing via OIDC (no NPM_TOKEN secret needed).
# One-time setup on npmjs.com:
#   1. https://www.npmjs.com/package/@sadhaka/loom-engine/access
#   2. Trusted Publishers -> Add Trusted Publisher
#   3. Provider: GitHub Actions
#      Owner: sadhaka
#      Repository: loom-engine
#      Workflow filename: npm-publish.yml
#      Environment: (leave blank)
# The workflow then exchanges its short-lived GitHub OIDC token for
# npm publish rights at runtime - no long-lived token to leak.
# Closes 12.2 audit finding L-06.
#
# Manual fallback: from a local checkout,
#   npm login                       (one-time, account: sadhaka)
#   npm test
#   npm run build
#   npm publish --dry-run           (verify tarball)
#   npm publish --access public

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only (no actual publish)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  # Opt Node-20 JS actions into Node 24 ahead of GitHub's forced migration
  # (June 2026) - silences the deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # setup-node@v6 silently injects github.token into NODE_AUTH_TOKEN
      # and writes .npmrc with `_authToken=${NODE_AUTH_TOKEN}`. npm
      # publish then sends the GitHub token to npm, which 404s because
      # it is not a valid npm credential. We must wipe both so the npm
      # CLI falls back to OIDC for Trusted Publishing. The `auth-token`
      # input that supposedly disables this in older setup-node
      # versions is not recognized by v6 (causes "Unexpected input"
      # warning); explicit cleanup is the only working path.
      - name: Force OIDC by clearing setup-node auth artifacts
        run: |
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            rm -f "$NPM_CONFIG_USERCONFIG"
          fi
          rm -f ~/.npmrc
          echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
          echo "NPM_CONFIG_USERCONFIG=" >> $GITHUB_ENV
          echo "[clear-auth] cleared .npmrc + NODE_AUTH_TOKEN; npm publish will use OIDC"

      - name: Update npm to pinned 11.x (for Trusted Publishing OIDC)
        # Node 20 ships with npm 10.x. Trusted Publishing OIDC auth
        # requires npm 11.5.1+. Without this, npm publish errors with
        # ENEEDAUTH because it does not negotiate OIDC at all.
        # Pinned to 11.x rather than @latest (closes 12.6 L-10):
        # unpinned @latest can introduce breaking npm changes silently.
        # Bump this version intentionally when needed.
        run: |
          npm install -g npm@11.5.2
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        # Round-8 P2 (release hygiene): clean BEFORE building so a stale
        # ignored dist/ from any prior context can never reach the pack -
        # the publish always ships exactly what this run compiled.
        run: |
          npm run clean
          npm run build

      - name: Post-build dist smoke (version embedded in the artifact)
        # Round-8 P2: assert the BUILT artifact carries this checkout's
        # LOOM_ENGINE_VERSION (local stale-dist incidents read 3.0.0 while
        # package.json said 3.1.1 - CI rebuilds, but this makes the
        # artifact-vs-manifest match an explicit, failing check).
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          DIST_VERSION=$(node -p "require('./dist/index.js').LOOM_ENGINE_VERSION")
          if [ "$PKG_VERSION" != "$DIST_VERSION" ]; then
            echo "dist LOOM_ENGINE_VERSION ($DIST_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "dist artifact version match: $DIST_VERSION"

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      # Trusted Publishing via OIDC (no NPM_TOKEN secret needed).
      # npm CLI v9.5+ (Node 20+ ships npm 10.x) auto-detects the
      # GitHub Actions OIDC token when NPM_TOKEN is absent and the
      # workflow has id-token: write permission (granted above).
      # One-time npm-side setup: package settings -> Trusted Publishers
      # -> add this repo + workflow filename. See L-06 from
      # SECURITY-AUDIT-0.10.0.md.
      # Rapid-stream policy (2026-05-09):
      # - Every tag-triggered publish lands on --tag beta.
      # - The npm `latest` tag is only moved on milestones via the
      #   separate npm-promote.yml workflow (workflow_dispatch).
      # - Keeps the npmjs.com headline version stable at the most
      #   recent milestone while rapid releases stay installable
      #   via @beta or explicit version pin.
      - name: Publish to npm (dry-run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --access public --provenance --tag beta --dry-run

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance --tag beta
