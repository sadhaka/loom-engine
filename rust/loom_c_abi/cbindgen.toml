# cbindgen config for loom_c_abi -> loom_engine.h
# Regenerate: cbindgen --config cbindgen.toml --crate loom_c_abi --output loom_engine.h
language = "C"
pragma_once = true
include_guard = "LOOM_ENGINE_H"
autogen_warning = "/* GENERATED by cbindgen - do not edit. Regenerate: cbindgen --config cbindgen.toml --crate loom_c_abi --output loom_engine.h */"
header = "/* loom_engine - C ABI for the Loom Engine deterministic core (Unity/C#, Godot, Go, C). One Rust core, byte-identical across every surface. */"
cpp_compat = true

[parse]
parse_deps = false

[export]
prefix = ""
