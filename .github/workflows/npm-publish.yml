name: Publish to npm

# Phase 11B.3: tag-triggered publish to npm.
#
# Trigger: a tag matching `v*` (e.g. `v0.10.0`) pushed to `main`.
# The workflow runs the test suite and full TS build, then
# `npm publish --access public` (scopes default to private; flag
# required for public release).
#
# Auth: Trusted Publishing via OIDC (no NPM_TOKEN secret needed).
# One-time setup on npmjs.com:
#   1. https://www.npmjs.com/package/@sadhaka/loom-engine/access
#   2. Trusted Publishers -> Add Trusted Publisher
#   3. Provider: GitHub Actions
#      Owner: sadhaka
#      Repository: loom-engine
#      Workflow filename: npm-publish.yml
#      Environment: (leave blank)
# The workflow then exchanges its short-lived GitHub OIDC token for
# npm publish rights at runtime - no long-lived token to leak.
# Closes 12.2 audit finding L-06.
#
# Manual fallback: from a local checkout,
#   npm login                       (one-time, account: sadhaka)
#   npm test
#   npm run build
#   npm publish --dry-run           (verify tarball)
#   npm publish --access public

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only (no actual publish)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          # Explicitly clear auth-token. setup-node@v6's default is
          # ${{ github.token }} on github.com, which gets written into
          # .npmrc and consumed by npm publish - sending a GitHub token
          # to npm 404s every time. Empty string disables that path so
          # npm CLI falls back to OIDC for Trusted Publishing.
          auth-token: ''

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      # Trusted Publishing via OIDC (no NPM_TOKEN secret needed).
      # npm CLI v9.5+ (Node 20+ ships npm 10.x) auto-detects the
      # GitHub Actions OIDC token when NPM_TOKEN is absent and the
      # workflow has id-token: write permission (granted above).
      # One-time npm-side setup: package settings -> Trusted Publishers
      # -> add this repo + workflow filename. See L-06 from
      # SECURITY-AUDIT-0.10.0.md.
      - name: Publish to npm (dry-run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --access public --provenance --dry-run

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance
