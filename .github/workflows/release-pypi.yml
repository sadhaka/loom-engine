# Publish the two Python surfaces of the Loom Engine to PyPI on a v* tag:
#   - loom-engine-rpg     : the pure-Python port (python/, setuptools)   -> sdist + py3-none-any wheel
#   - loom-engine-native  : the PyO3/maturin wheel (rust/loom_py)         -> sdist + cp38-abi3 wheels (Linux/macOS/Windows)
#
# Auth: PyPI Trusted Publishing (OIDC) - NO stored token. Each project must have a
# trusted publisher registered on PyPI pointing at this repo + workflow + the job's
# environment (one-time setup). For the first publish, register them as PyPI "pending
# publishers".
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt the Node-20 JS actions (checkout/setup-python/artifact) into Node 24 ahead of
  # GitHub's forced migration (June 2026) - silences the deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---- loom-engine-rpg (pure Python) ----------------------------------------
  build-rpg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trust workspace (git safe.directory)
        run: git config --global --add safe.directory '*'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: python
      - uses: actions/upload-artifact@v4
        with:
          name: dist-rpg
          path: python/dist/*

  # ---- loom-engine-native (PyO3 wheels, one cp38-abi3 wheel per OS) ----------
  build-native-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Trust workspace (git safe.directory)
        run: git config --global --add safe.directory '*'
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m rust/loom_py/Cargo.toml --out dist
          manylinux: auto
          before-script-linux: git config --global --add safe.directory '*'
      - uses: actions/upload-artifact@v4
        with:
          name: dist-native-${{ matrix.os }}
          path: dist/*

  build-native-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trust workspace (git safe.directory)
        run: git config --global --add safe.directory '*'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m rust/loom_py/Cargo.toml --out dist
          before-script-linux: git config --global --add safe.directory '*'
      - uses: actions/upload-artifact@v4
        with:
          name: dist-native-sdist
          path: dist/*

  # ---- publish (trusted publishing; each project = its own OIDC environment) -
  publish-rpg:
    needs: [build-rpg]
    runs-on: ubuntu-latest
    environment: pypi-loom-engine-rpg
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-rpg
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-native:
    needs: [build-native-wheels, build-native-sdist]
    runs-on: ubuntu-latest
    environment: pypi-loom-engine-native
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-native-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
