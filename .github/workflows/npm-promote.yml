name: Promote npm version to latest

# Milestone-only promotion. Tag-triggered publishes go to `--tag beta`
# (see npm-publish.yml). When a wave milestone lands (e.g. 1.0.0,
# 1.1.5 GhostReplay, 1.2.5 LootTier), run this workflow manually
# from the GitHub Actions tab to move the npm `latest` dist-tag.
#
# Usage:
#   1. Click "Actions" -> "Promote npm version to latest"
#   2. "Run workflow" -> enter version (e.g. 1.2.5) -> Run.
#
# The version must already exist on npm (published via the
# tag-triggered workflow). This workflow does not republish,
# only re-tags.
#
# Auth: Trusted Publishing via OIDC, same as npm-publish.yml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'npm version to promote to latest (e.g. 1.2.5)'
        required: true
        type: string
      dry_run:
        description: 'Print the dist-tag command without executing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-promote-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Force OIDC by clearing setup-node auth artifacts
        run: |
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            rm -f "$NPM_CONFIG_USERCONFIG"
          fi
          rm -f ~/.npmrc
          echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
          echo "NPM_CONFIG_USERCONFIG=" >> $GITHUB_ENV

      - name: Update npm to pinned 11.x (for OIDC)
        run: |
          npm install -g npm@11.5.2
          npm --version

      - name: Validate version exists on npm
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! npm view "@sadhaka/loom-engine@${VERSION}" version > /dev/null 2>&1; then
            echo "Version ${VERSION} not found on npm. Did the publish workflow run?"
            exit 1
          fi
          echo "Version ${VERSION} exists on npm."

      - name: Show current dist-tags
        run: npm view @sadhaka/loom-engine dist-tags

      - name: Promote ${{ github.event.inputs.version }} to latest (dry-run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "DRY RUN - would execute:"
          echo "npm dist-tag add @sadhaka/loom-engine@${{ github.event.inputs.version }} latest"

      - name: Promote ${{ github.event.inputs.version }} to latest
        if: github.event.inputs.dry_run != 'true'
        run: |
          npm dist-tag add @sadhaka/loom-engine@${{ github.event.inputs.version }} latest
          echo "Promoted ${{ github.event.inputs.version }} to latest."

      - name: Show updated dist-tags
        if: github.event.inputs.dry_run != 'true'
        run: npm view @sadhaka/loom-engine dist-tags
