name: Deploy TypeDoc + demo gallery to gh-pages branch

# Phase 9.3 + 11A.2 + 14.2: build the public-API reference from
# src/index.ts AND the examples gallery in demo/, then publish both
# to the gh-pages branch on every push to main. Cloudflare Pages
# serves the gh-pages branch at loom-engine.pages.dev (GitHub Pages
# itself is unavailable: private repo on free user plan).
#
# Tree layout published to gh-pages (and therefore loom-engine.pages.dev):
#   /                       hand-written brutalist landing (landing/index.html)
#   /reference.html         TypeDoc site root (api reference - was index.html)
#   /classes/               TypeDoc class pages
#   /interfaces/            TypeDoc interface pages
#   /modules.html           TypeDoc module index
#   /assets/                TypeDoc CSS / JS / icon assets
#   /demo/                  examples gallery index
#   /demo/<name>/           individual demos (survivor-mini, plaza-mini, ...)
#   /dist/                  engine bundle that demos resolve via importmap
#
# - npm run build:all compiles the engine (-> dist/) AND every demo
#   (-> demo/<name>/main.js)
# - npm run docs:ci writes a clean TypeDoc tree to ./docs-build/
# - We copy demo/ and dist/ into docs-build/ so the demos can resolve
#   their `@sadhaka/loom-engine` importmap target on the deployed site
# - peaceiris/actions-gh-pages publishes the merged tree to gh-pages
# - Cloudflare Pages auto-deploys on every gh-pages push (1-2 min)
# - workflow_dispatch lets us re-deploy from the Actions UI on demand
# - PRs only build (no deploy) so we catch typedoc warnings before merge
#
# See README.md "Docs deploy" section for the activation steps if the
# Cloudflare Pages project is ever re-created.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# peaceiris/actions-gh-pages has no Node 24 release as of v4.0.0 (last
# release 2024-04-08, default branch action.yml still pins node20).
# This env forces GitHub's runner to host JS actions on Node 24 even
# when their action.yml declares node20, clearing the June 2026
# deprecation cliff. Remove once peaceiris ships a Node 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build engine + demos
        run: npm run build:all

      - name: Build TypeDoc site
        run: npm run docs:ci

      - name: Stage demo gallery + engine bundle into TypeDoc tree
        run: |
          cp -r demo docs-build/demo
          cp -r dist docs-build/dist

      - name: Stage hand-written brutalist landing in front of TypeDoc
        # The auto-generated TypeDoc site has its own homepage at
        # docs-build/index.html. We move it to reference.html and put
        # our hand-written landing/index.html at the docs root. All of
        # TypeDoc's classes/, interfaces/, modules.html, assets/, etc.
        # stay at the root and continue to resolve as before; only the
        # entry page changes. The landing links to reference.html for
        # the API surface.
        run: |
          mv docs-build/index.html docs-build/reference.html
          cp landing/index.html docs-build/index.html

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-build
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: deploy TypeDoc + demo gallery for ${{ github.sha }}'
