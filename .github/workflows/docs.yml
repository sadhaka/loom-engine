name: Deploy TypeDoc to gh-pages branch

# Phase 9.3 + 11A.2: build the public-API reference from src/index.ts
# and publish it to the gh-pages branch on every push to main.
# Cloudflare Pages serves the gh-pages branch at loom-engine.pages.dev
# (GitHub Pages itself is unavailable: private repo on free user plan).
#
# - npm run docs:ci writes a clean tree to ./docs-build/
# - peaceiris/actions-gh-pages publishes that tree to gh-pages
# - Cloudflare Pages auto-deploys on every gh-pages push (1-2 min)
# - workflow_dispatch lets us re-deploy from the Actions UI on demand
# - PRs only build (no deploy) so we catch typedoc warnings before merge
#
# See README.md "Docs deploy" section for the activation steps if the
# Cloudflare Pages project is ever re-created.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build TypeDoc site
        run: npm run docs:ci

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-build
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: deploy TypeDoc for ${{ github.sha }}'
