<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Loom Engine - Phase 1 Demo</title>
  <style>
    html, body { margin: 0; padding: 0; background: #14110d; color: #e8d8b6; font: 13px/1.4 sans-serif; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
    canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; background: #000; border: 1px solid #2a241a; }
    .stats { margin-top: 8px; font-family: ui-monospace, Consolas, monospace; color: #b6a17a; white-space: pre; }
    h1 { margin: 0 0 12px; font-size: 14px; color: #d6c694; letter-spacing: 0.05em; text-transform: uppercase; }
    p { margin: 4px 0; color: #8a7c5e; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Loom Engine - Phase 1 Demo</h1>
    <p>One iso tile + one sprite. Static scene at 60fps. No three.js, no PIXI. Canvas2D + procedural assets.</p>
    <canvas id="stage" width="640" height="400"></canvas>
    <div class="stats" id="stats">booting...</div>
  </div>
  <script type="module" src="./demo.js"></script>
</body>
</html>
